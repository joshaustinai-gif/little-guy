<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 260" width="120" height="260">
  <!-- Shadow -->
  <ellipse cx="60" cy="256" rx="28" ry="5" fill="#ccc9c0" opacity="0.6"/>

  <!-- Shoes -->
  <ellipse cx="46" cy="245" rx="14" ry="7" fill="white" stroke="#1a1a1a" stroke-width="2.5"/>
  <ellipse cx="74" cy="245" rx="14" ry="7" fill="white" stroke="#1a1a1a" stroke-width="2.5"/>

  <!-- Pants -->
  <rect x="34" y="160" width="22" height="88" rx="6" fill="#3BB8F0" stroke="#1a1a1a" stroke-width="2.5"/>
  <rect x="64" y="160" width="22" height="88" rx="6" fill="#3BB8F0" stroke="#1a1a1a" stroke-width="2.5"/>
  <!-- Pants top join -->
  <rect x="34" y="155" width="52" height="18" rx="4" fill="#3BB8F0" stroke="#1a1a1a" stroke-width="2.5"/>
  <!-- Belt area -->
  <rect x="34" y="153" width="52" height="8" rx="3" fill="#e8e0d0" stroke="#1a1a1a" stroke-width="1.5"/>

  <!-- Shirt body -->
  <rect x="28" y="95" width="64" height="70" rx="8" fill="white" stroke="#1a1a1a" stroke-width="2.5"/>

  <!-- Shirt collar -->
  <polyline points="52,95 60,108 68,95" fill="white" stroke="#1a1a1a" stroke-width="2"/>

  <!-- Shirt buttons -->
  <circle cx="60" cy="118" r="2" fill="#1a1a1a"/>
  <circle cx="60" cy="130" r="2" fill="#1a1a1a"/>
  <circle cx="60" cy="142" r="2" fill="#1a1a1a"/>
  <circle cx="60" cy="154" r="2" fill="#1a1a1a"/>

  <!-- Chest pocket -->
  <rect x="34" y="108" width="18" height="14" rx="2" fill="white" stroke="#1a1a1a" stroke-width="1.8"/>

  <!-- Arms -->
  <!-- Left arm -->
  <rect x="12" y="98" width="18" height="52" rx="9" fill="white" stroke="#1a1a1a" stroke-width="2.5"/>
  <!-- Left hand -->
  <ellipse cx="21" cy="153" rx="9" ry="8" fill="#f5c5a0" stroke="#1a1a1a" stroke-width="2"/>
  <!-- Right arm -->
  <rect x="90" y="98" width="18" height="52" rx="9" fill="white" stroke="#1a1a1a" stroke-width="2.5"/>
  <!-- Right hand -->
  <ellipse cx="99" cy="153" rx="9" ry="8" fill="#f5c5a0" stroke="#1a1a1a" stroke-width="2"/>

  <!-- Neck -->
  <rect x="52" y="80" width="16" height="18" rx="5" fill="#f5c5a0" stroke="#1a1a1a" stroke-width="2"/>

  <!-- Head -->
  <ellipse cx="60" cy="58" rx="34" ry="36" fill="#f5c5a0" stroke="#1a1a1a" stroke-width="2.5"/>

  <!-- Curly brown hair -->
  <!-- Top mass -->
  <ellipse cx="60" cy="28" rx="30" ry="16" fill="#6B3A1F"/>
  <!-- Left curls -->
  <circle cx="34" cy="34" r="12" fill="#6B3A1F"/>
  <circle cx="28" cy="44" r="10" fill="#6B3A1F"/>
  <circle cx="32" cy="55" r="8" fill="#6B3A1F"/>
  <!-- Right curls -->
  <circle cx="86" cy="34" r="12" fill="#6B3A1F"/>
  <circle cx="92" cy="44" r="10" fill="#6B3A1F"/>
  <circle cx="88" cy="55" r="8" fill="#6B3A1F"/>
  <!-- Top center curls -->
  <circle cx="50" cy="20" r="10" fill="#7A4428"/>
  <circle cx="70" cy="20" r="10" fill="#7A4428"/>
  <circle cx="60" cy="16" r="9" fill="#7A4428"/>
  <!-- Hair outline -->
  <ellipse cx="60" cy="28" rx="30" ry="16" fill="none" stroke="#3d1f08" stroke-width="1.5"/>
  <circle cx="34" cy="34" r="12" fill="none" stroke="#3d1f08" stroke-width="1.2"/>
  <circle cx="86" cy="34" r="12" fill="none" stroke="#3d1f08" stroke-width="1.2"/>

  <!-- Eyes -->
  <ellipse cx="48" cy="58" rx="5" ry="5.5" fill="white" stroke="#1a1a1a" stroke-width="1.5"/>
  <ellipse cx="72" cy="58" rx="5" ry="5.5" fill="white" stroke="#1a1a1a" stroke-width="1.5"/>
  <circle cx="49" cy="59" r="2.5" fill="#1a1a1a"/>
  <circle cx="73" cy="59" r="2.5" fill="#1a1a1a"/>
  <!-- Eye shine -->
  <circle cx="50" cy="58" r="1" fill="white"/>
  <circle cx="74" cy="58" r="1" fill="white"/>

  <!-- Eyebrows -->
  <path d="M43 51 Q48 48 53 51" fill="none" stroke="#3d1f08" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M67 51 Q72 48 77 51" fill="none" stroke="#3d1f08" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Mustache -->
  <path d="M46 70 Q53 65 60 68 Q67 65 74 70 Q67 75 60 72 Q53 75 46 70Z" fill="#3d1f08" stroke="#1a1a1a" stroke-width="1"/>

  <!-- Mouth / smile line -->
  <path d="M53 76 Q60 80 67 76" fill="none" stroke="#1a1a1a" stroke-width="2" stroke-linecap="round"/>
</svg>
