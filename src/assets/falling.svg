<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 200" width="240" height="200">
  <!-- Motion lines (background) -->
  <line x1="180" y1="10" x2="230" y2="50" stroke="#ccc" stroke-width="3" stroke-linecap="round" opacity="0.7"/>
  <line x1="190" y1="25" x2="235" y2="60" stroke="#ccc" stroke-width="2.5" stroke-linecap="round" opacity="0.6"/>
  <line x1="175" y1="40" x2="225" y2="75" stroke="#ccc" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
  <line x1="10" y1="80" x2="50" y2="120" stroke="#ccc" stroke-width="2.5" stroke-linecap="round" opacity="0.6"/>
  <line x1="18" y1="95" x2="55" y2="130" stroke="#ccc" stroke-width="2" stroke-linecap="round" opacity="0.5"/>

  <!-- Body group: rotated ~20deg, belly-up falling pose -->
  <g transform="translate(120,100) rotate(-15)">

    <!-- Shirt (torso, tilted) -->
    <rect x="-32" y="-28" width="64" height="56" rx="10" fill="white" stroke="#1a1a1a" stroke-width="2.5"/>
    <!-- Shirt collar -->
    <polyline points="-10,-28 0,-16 10,-28" fill="white" stroke="#1a1a1a" stroke-width="2"/>
    <!-- Shirt buttons -->
    <circle cx="0" cy="-5" r="2" fill="#1a1a1a"/>
    <circle cx="0" cy="7" r="2" fill="#1a1a1a"/>
    <circle cx="0" cy="19" r="2" fill="#1a1a1a"/>
    <!-- Chest pocket -->
    <rect x="-28" y="-18" width="16" height="12" rx="2" fill="white" stroke="#1a1a1a" stroke-width="1.8"/>

    <!-- Pants (hips, legs splayed upward) -->
    <!-- Left leg (up and left) -->
    <g transform="translate(-18,28) rotate(-50)">
      <rect x="-11" y="0" width="22" height="60" rx="9" fill="#3BB8F0" stroke="#1a1a1a" stroke-width="2.5"/>
      <!-- Shoe -->
      <ellipse cx="0" cy="64" rx="14" ry="8" fill="white" stroke="#1a1a1a" stroke-width="2.5" transform="rotate(50)"/>
    </g>
    <!-- Right leg (up and right) -->
    <g transform="translate(18,28) rotate(40)">
      <rect x="-11" y="0" width="22" height="60" rx="9" fill="#3BB8F0" stroke="#1a1a1a" stroke-width="2.5"/>
      <!-- Shoe -->
      <ellipse cx="0" cy="64" rx="14" ry="8" fill="white" stroke="#1a1a1a" stroke-width="2.5" transform="rotate(-40)"/>
    </g>
    <!-- Pants waist join -->
    <rect x="-28" y="20" width="56" height="20" rx="5" fill="#3BB8F0" stroke="#1a1a1a" stroke-width="2.5"/>

    <!-- Left arm (splayed out-left, reaching) -->
    <g transform="translate(-32,-10) rotate(-60)">
      <rect x="-9" y="0" width="18" height="55" rx="9" fill="white" stroke="#1a1a1a" stroke-width="2.5"/>
      <ellipse cx="0" cy="58" rx="10" ry="9" fill="#f5c5a0" stroke="#1a1a1a" stroke-width="2"/>
    </g>
    <!-- Right arm (splayed out-right, reaching) -->
    <g transform="translate(32,-10) rotate(50)">
      <rect x="-9" y="0" width="18" height="55" rx="9" fill="white" stroke="#1a1a1a" stroke-width="2.5"/>
      <ellipse cx="0" cy="58" rx="10" ry="9" fill="#f5c5a0" stroke="#1a1a1a" stroke-width="2"/>
    </g>

    <!-- Neck -->
    <rect x="-8" y="-42" width="16" height="16" rx="5" fill="#f5c5a0" stroke="#1a1a1a" stroke-width="2"/>

    <!-- Head -->
    <ellipse cx="0" cy="-68" rx="34" ry="32" fill="#f5c5a0" stroke="#1a1a1a" stroke-width="2.5"/>

    <!-- Hair -->
    <ellipse cx="0" cy="-88" rx="30" ry="14" fill="#6B3A1F"/>
    <circle cx="-26" cy="-82" r="11" fill="#6B3A1F"/>
    <circle cx="-30" cy="-72" r="9" fill="#6B3A1F"/>
    <circle cx="26" cy="-82" r="11" fill="#6B3A1F"/>
    <circle cx="30" cy="-72" r="9" fill="#6B3A1F"/>
    <circle cx="-10" cy="-96" r="9" fill="#7A4428"/>
    <circle cx="10" cy="-96" r="9" fill="#7A4428"/>
    <circle cx="0" cy="-98" r="8" fill="#7A4428"/>

    <!-- Wide scared eyes -->
    <ellipse cx="-12" cy="-70" rx="8" ry="9" fill="white" stroke="#1a1a1a" stroke-width="2"/>
    <ellipse cx="12" cy="-70" rx="8" ry="9" fill="white" stroke="#1a1a1a" stroke-width="2"/>
    <circle cx="-12" cy="-69" r="5" fill="#1a1a1a"/>
    <circle cx="12" cy="-69" r="5" fill="#1a1a1a"/>
    <!-- Wide pupils (scared look) -->
    <circle cx="-10" cy="-71" r="2" fill="white"/>
    <circle cx="14" cy="-71" r="2" fill="white"/>

    <!-- Eyebrows raised in fear -->
    <path d="M-18 -82 Q-12 -88 -6 -82" fill="none" stroke="#3d1f08" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M6 -82 Q12 -88 18 -82" fill="none" stroke="#3d1f08" stroke-width="2.5" stroke-linecap="round"/>

    <!-- Mustache -->
    <path d="M-14,-56 Q-7,-61 0,-58 Q7,-61 14,-56 Q7,-52 0,-54 Q-7,-52 -14,-56Z" fill="#3d1f08" stroke="#1a1a1a" stroke-width="1"/>

    <!-- Open scared mouth -->
    <ellipse cx="0" cy="-45" rx="7" ry="5" fill="#1a1a1a"/>
    <ellipse cx="0" cy="-45" rx="5" ry="3.5" fill="#cc3333"/>

  </g>
</svg>
